version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  read_write:
  - /sandbox
  - /tmp
  - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude_code
    endpoints:
    - host: api.anthropic.com
      port: 443
    - host: statsig.anthropic.com
      port: 443
    - host: sentry.io
      port: 443
    - host: raw.githubusercontent.com
      port: 443
    - host: platform.claude.com
      port: 443
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/node
  github:
    name: github
    endpoints:
    - host: github.com
      port: 443
    binaries:
    - path: /usr/bin/git
  github_rest_api:
    name: github-rest-api
    endpoints:
    - host: api.github.com
      port: 443
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/gh
  gitlab:
    name: gitlab
    endpoints:
    - host: gitlab.com
      port: 443
    - host: gitlab.mycorp.com
      port: 443
    binaries:
    - path: /usr/bin/glab
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
    binaries:
    - path: /usr/bin/curl
    - path: /bin/bash
    - path: /usr/local/bin/opencode
  nvidia_web:
    name: nvidia_web
    endpoints:
    - host: nvidia.com
      port: 443
    - host: www.nvidia.com
      port: 443
    binaries:
    - path: /usr/bin/curl
  clawhub_access:
    name: "ClawHub Registry Access"
    binaries:
    - path: /usr/bin/node
    - path: /usr/bin/npm
    - path: /usr/bin/curl
    endpoints:
    - host: clawhub.com
      port: 443
    - host: "*.openclaw.ai"
      port: 443
  npm_registry_access:
    name: "NPM Registry Access"
    binaries:
    - path: /usr/bin/node
    - path: /usr/bin/npm
    endpoints:
    - host: registry.npmjs.org
      port: 443
    - host: registry.yarnpkg.com
      port: 443
  llm_api_access:
    name: "LLM Provider Access"
    binaries:
    - path: /usr/bin/node
    - path: /usr/bin/curl
    endpoints:
    - host: host.docker.internal
      port: 11434
      protocol: rest
      tls: none
      enforcement: enforce
      access: full
    - host: host.openshell.internal
      port: 11434
      protocol: rest
      tls: none
      enforcement: enforce
      access: full
    - host: 192.168.65.254
      port: 11434
      protocol: rest
      tls: none
      enforcement: enforce
      access: full
    - host: 192.168.219.192
      port: 11434
      protocol: rest
      tls: none
      enforcement: enforce
      access: full
    - host: api.openai.com
      port: 443
    - host: api.anthropic.com
      port: 443
    - host: "*.google.com"
      port: 443
    - host: google.com
      port: 443
