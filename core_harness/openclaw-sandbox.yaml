name: jarvis-box
version: "1.0.0"
description: "Declarative OpenClaw Sandbox for Jarvis Agent"

runtime:
  engine: openshell
  image: nvidia/nemoclaw-base:latest
  options:
    memory: 8GB
    cpus: 4

env:
  OPENCLAW_PROFILE: jarvis
  LOG_LEVEL: info
  OPENCLAW_LLM_PROVIDER: ollama
  OPENCLAW_LLM_MODEL: qwen2.5:7b
  OPENCLAW_LLM_BASE_URL: http://host.docker.internal:11434/v1

skills:
  sources:
    - name: openclaw-bundled
      type: builtin
    - name: clawhub
      type: registry
      url: https://clawhub.com

  # Essential Skills to be pre-installed/verified
  required:
    # Meta & System
    - healthcheck
    - skill-creator
    - session-logs
    - mcporter
    
    # Productivity
    - apple-notes
    - apple-reminders
    - notion
    - obsidian
    
    # Communication
    - slack
    - wacli
    
    # Tools
    - summarize
    - weather

policies:
  network:
    egress:
      - host: "*.openclaw.ai"
        port: 443
      - host: "clawhub.com"
        port: 443
      - host: "registry.npmjs.org"
        port: 443
      - host: "registry.yarnpkg.com"
        port: 443
      - host: "host.docker.internal"
        port: 11434
      - host: "api.openai.com"
        port: 443
      - host: "api.anthropic.com"
        port: 443
      - host: "*.google.com"
        port: 443
  filesystem:
    read_only:
      - /sandbox
    writable:
      - /sandbox/.openclaw-data
      - /tmp
